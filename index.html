<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restaurants</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#fafafa;--card:#fff;--text:#1a1a1a;--text2:#666;--text3:#999;
--border:#e8e8e8;--accent:#00e5ff;--accent-dim:rgba(0,229,255,0.15);
--shadow:0 1px 4px rgba(0,0,0,0.04);--shadow-hover:0 8px 24px rgba(0,0,0,0.08);
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6}

/* HEADER */
.hero{text-align:center;padding:60px 20px 40px}
.hero h1{font-family:'Orbitron',sans-serif;font-size:clamp(36px,6vw,56px);font-weight:700;letter-spacing:6px;text-transform:uppercase;color:var(--text);text-shadow:0 0 20px rgba(0,229,255,0.5),0 0 60px rgba(0,229,255,0.15)}

/* TOOLBAR */
.toolbar{max-width:1320px;margin:0 auto;padding:0 40px 32px;display:flex;flex-wrap:wrap;align-items:center;gap:12px;justify-content:space-between}
.filters{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.pill{padding:7px 18px;border:1px solid var(--border);border-radius:99px;background:var(--card);font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .2s;color:var(--text2)}
.pill:hover{border-color:var(--accent)}
.pill.active{background:var(--text);color:#fff;border-color:var(--text)}
select.cuisine-select{padding:7px 14px;border:1px solid var(--border);border-radius:99px;background:var(--card);font-size:12px;font-family:'Inter',sans-serif;color:var(--text2);cursor:pointer;outline:none}
select.cuisine-select:focus{border-color:var(--accent)}
.stats{font-size:12px;color:var(--text3);letter-spacing:.5px}
.stats span{font-weight:600;color:var(--text)}
.search-input{padding:7px 14px;border:1px solid var(--border);border-radius:99px;background:var(--card);font-size:12px;font-family:'Inter',sans-serif;color:var(--text);width:200px}
.search-input:focus{outline:none;border-color:var(--accent)}

/* GRID */
.grid{max-width:1320px;margin:0 auto;padding:0 40px 60px;display:grid;grid-template-columns:repeat(3,1fr);gap:24px}

/* CARD */
.card{background:var(--card);border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);transition:box-shadow .3s,transform .3s;cursor:pointer;display:flex;flex-direction:column}
.card:hover{box-shadow:var(--shadow-hover);transform:translateY(-2px)}
.card-img{height:200px;overflow:hidden;position:relative;flex-shrink:0}
.card-img img{width:100%;height:100%;object-fit:cover;display:block}
.badge{position:absolute;top:12px;right:12px;padding:4px 12px;border-radius:99px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.badge-togo{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.badge-tried{background:#00b894;color:#fff}
.rating-pill{position:absolute;bottom:12px;left:12px;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);padding:5px 12px;border-radius:8px;display:flex;align-items:center;gap:6px}
.rating-pill .score{font-size:16px;font-weight:600}
.rating-pill .count{font-size:10px;color:var(--text3)}

/* MICHELIN BADGE */
.michelin-badge{position:absolute;top:12px;left:12px;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;border:1.5px solid #00e5ff;box-shadow:0 0 8px rgba(0,229,255,0.4);background:#1a1a1a;color:#00e5ff;z-index:2}

/* CARD SUMMARY */
.card-summary{padding:18px 20px;display:flex;justify-content:space-between;align-items:flex-start}
.card-name{font-size:17px;font-weight:500;letter-spacing:-.2px;margin-bottom:6px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;color:var(--text2);background:var(--bg);padding:3px 8px;border-radius:4px}
.card-right{text-align:right;flex-shrink:0;margin-left:12px}
.price{font-size:13px;color:var(--text3);font-weight:500}
.expand-icon{display:inline-block;margin-top:8px;width:22px;height:22px;border-radius:50%;border:1px solid var(--border);text-align:center;line-height:20px;font-size:14px;color:var(--text3);transition:all .3s}
.card.open .expand-icon{transform:rotate(45deg);color:var(--accent);border-color:var(--accent)}

/* EXPANDABLE DETAIL */
.card-detail{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.4,0,.2,1)}
.card.open .card-detail{max-height:1200px}
.detail-inner{padding:0 20px 20px;border-top:1px solid var(--border)}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:16px 0}
.info-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.info-val{font-size:13px}
.dishes{margin:14px 0;padding:14px;background:var(--bg);border-radius:10px}
.dishes-title{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.dishes-list{display:flex;flex-wrap:wrap;gap:6px}
.dish{font-size:11px;padding:5px 10px;background:var(--card);border:1px solid var(--border);border-radius:5px}
.reviews{margin:14px 0}
.review{padding:10px 0;border-bottom:1px solid var(--border)}
.review:last-child{border-bottom:none}
.rev-head{display:flex;justify-content:space-between;margin-bottom:4px}
.rev-name{font-size:12px;font-weight:500}
.rev-stars{font-size:11px;color:#f39c12}
.rev-text{font-size:12px;color:var(--text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.booking{margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.booking-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.booking-val{font-size:13px}
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:14px}
.gallery img{width:100%;height:70px;object-fit:cover;border-radius:6px}

/* LOADING & PAGINATION */
.loading{text-align:center;padding:40px;color:var(--text3)}
.load-more{text-align:center;padding:20px}
.load-more button{padding:12px 32px;border:1px solid var(--border);border-radius:99px;background:var(--card);font-size:13px;cursor:pointer;transition:all .2s}
.load-more button:hover{border-color:var(--accent);background:var(--accent);color:#fff}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--text3);display:none}
.empty.show{display:block}

/* RESPONSIVE */
@media(max-width:1024px){.grid{grid-template-columns:repeat(2,1fr);padding:0 24px 40px}}
@media(max-width:640px){.grid{grid-template-columns:1fr;padding:0 16px 32px}.toolbar{padding:0 16px 24px}.hero{padding:40px 16px 28px}.hero h1{letter-spacing:3px}}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="hero"><h1>Restaurants</h1></div>

<div class="toolbar">
<div class="filters">
<button class="pill active" data-status="all">All</button>
<button class="pill" data-status="togo">To Go</button>
<button class="pill" data-status="tried">Tried</button>
<select class="cuisine-select" id="locationFilter">
<option value="all">All Locations</option>
<option value="bay-area">South Bay</option>
<option value="napa">Napa</option>
<option value="sf">San Francisco</option>
<option value="new-york">New York</option>
<option value="shanghai">Shanghai</option>
<option value="los-angeles">Los Angeles</option>
</select>
<select class="cuisine-select" id="michelinFilter">
<option value="all">All Stars</option>
<option value="1">★ (1 star)</option>
<option value="2">★★ (2 stars)</option>
<option value="3">★★★ (3 stars)</option>
</select>
<select class="cuisine-select" id="cuisineFilter">
<option value="all">All Cuisines</option>
<option value="american">American</option>
<option value="asian-fusion">Asian Fusion</option>
<option value="chinese">Chinese</option>
<option value="french">French</option>
<option value="german">German</option>
<option value="italian">Italian</option>
<option value="japanese">Japanese</option>
<option value="korean">Korean</option>
<option value="peruvian">Peruvian</option>
<option value="russian">Russian</option>
</select>
<select class="cuisine-select" id="occasionFilter">
<option value="all">All Occasions</option>
<option value="date">Date Night</option>
<option value="casual">Casual</option>
<option value="special">Special</option>
<option value="business">Business</option>
<option value="brunch">Brunch</option>
</select>
<input type="text" class="search-input" id="searchInput" placeholder="Search restaurants...">
</div>
<div class="stats"><span id="sTotal">0</span> total · <span id="sTried">0</span> tried · <span id="sTogo">0</span> to go</div>
</div>

<div class="grid" id="grid"></div>
<div class="load-more" id="loadMore"><button onclick="loadMore()">Load More</button></div>
<div class="empty" id="empty">🔍 No restaurants match your filters</div>

<script src="restaurants.js"></script>
<script>
// State
let allRestaurants = [];
let filteredRestaurants = [];
let displayedCount = 0;
const BATCH_SIZE = 24;

// Filters
let statusFilter = 'all';
let cuisineFilter = 'all';
let locationFilter = 'all';
let occasionFilter = 'all';
let michelinFilter = 'all';
let searchQuery = '';

// Initialize
function init() {
    allRestaurants = window.restaurantData || [];
    applyFilters();
    setupEventListeners();
    updateStats();
}

// Setup event listeners
function setupEventListeners() {
    // Status pills
    document.querySelectorAll('.pill').forEach(p => {
        p.addEventListener('click', () => {
            document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
            p.classList.add('active');
            statusFilter = p.dataset.status;
            applyFilters();
        });
    });

    // Filters
    document.getElementById('cuisineFilter').addEventListener('change', (e) => {
        cuisineFilter = e.target.value;
        applyFilters();
    });
    document.getElementById('locationFilter').addEventListener('change', (e) => {
        locationFilter = e.target.value;
        applyFilters();
    });
    document.getElementById('occasionFilter').addEventListener('change', (e) => {
        occasionFilter = e.target.value;
        applyFilters();
    });
    document.getElementById('michelinFilter').addEventListener('change', (e) => {
        michelinFilter = e.target.value;
        applyFilters();
    });
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        applyFilters();
    });

    // Card expand
    document.getElementById('grid').addEventListener('click', (e) => {
        const card = e.target.closest('.card');
        if (!card) return;
        if (e.target.tagName === 'A') return;
        card.classList.toggle('open');
    });
}

// Apply filters
function applyFilters() {
    filteredRestaurants = allRestaurants.filter(r => {
        const ms = statusFilter === 'all' || r.status === statusFilter;
        const mc = cuisineFilter === 'all' || r.cuisine === cuisineFilter;
        const ml = locationFilter === 'all' || r.location === locationFilter;
        const mo = occasionFilter === 'all' || r.occasion === occasionFilter;
        const mm = michelinFilter === 'all' || r.michelin === parseInt(michelinFilter);
        const mq = !searchQuery || r.name.toLowerCase().includes(searchQuery) || r.tags.some(t => t.toLowerCase().includes(searchQuery));
        return ms && mc && ml && mo && mm && mq;
    });

    // Sort
    if (statusFilter === 'tried') {
        filteredRestaurants.sort((a, b) => (b.date || '2000-01-01').localeCompare(a.date || '2000-01-01'));
    } else {
        // Random shuffle for variety
        for (let i = filteredRestaurants.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [filteredRestaurants[i], filteredRestaurants[j]] = [filteredRestaurants[j], filteredRestaurants[i]];
        }
    }

    displayedCount = 0;
    document.getElementById('grid').innerHTML = '';
    loadMore();
    updateStats();
}

// Load more cards
function loadMore() {
    const grid = document.getElementById('grid');
    const toAdd = filteredRestaurants.slice(displayedCount, displayedCount + BATCH_SIZE);
    
    toAdd.forEach(r => {
        grid.appendChild(createCard(r));
    });
    
    displayedCount += toAdd.length;
    
    // Show/hide load more button
    document.getElementById('loadMore').style.display = displayedCount >= filteredRestaurants.length ? 'none' : 'block';
    document.getElementById('empty').classList.toggle('show', filteredRestaurants.length === 0);
}

// Create card HTML
function createCard(r) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.status = r.status;
    card.dataset.cuisine = r.cuisine;
    card.dataset.location = r.location;
    card.dataset.occasion = r.occasion;
    if (r.date) card.dataset.date = r.date;

    const michelinBadge = r.michelin ? `<span class="michelin-badge">${'★'.repeat(r.michelin)}</span>` : '';
    const statusBadge = r.status === 'tried' 
        ? `<span class="badge badge-tried">Tried${r.date ? ' · ' + formatDate(r.date) : ''}</span>`
        : `<span class="badge badge-togo">To Go</span>`;
    const tagsHtml = r.tags.map(t => `<span class="tag">${t}</span>`).join('');
    const dishesHtml = r.dishes.map(d => `<span class="dish">${d}</span>`).join('');
    const reviewsHtml = r.reviews.map(rv => `
        <div class="review">
            <div class="rev-head"><span class="rev-name">${rv.name}</span><span class="rev-stars">${'★'.repeat(rv.rating)}</span></div>
            <div class="rev-text">${rv.text}</div>
        </div>
    `).join('');
    const galleryHtml = r.gallery.map((g, i) => `<img src="${g}" alt="" loading="lazy">`).join('');

    card.innerHTML = `
        <div class="card-img">
            <img src="${r.heroImage}" alt="${r.name}" loading="lazy">
            ${michelinBadge}
            ${statusBadge}
            <div class="rating-pill"><span class="score">${r.rating}</span><span class="count">${r.reviewCount} reviews</span></div>
        </div>
        <div class="card-summary">
            <div><div class="card-name">${r.name}</div><div class="card-tags">${tagsHtml}</div></div>
            <div class="card-right"><div class="price">${r.price}</div><div class="expand-icon">+</div></div>
        </div>
        <div class="card-detail">
            <div class="detail-inner">
                <div class="info-grid">
                    <div><div class="info-label">📍 Address</div><div class="info-val">${r.address}</div></div>
                    <div><div class="info-label">📞 Phone</div><div class="info-val">${r.phone}</div></div>
                    <div><div class="info-label">🎯 Occasion</div><div class="info-val">${r.occasionLabel}</div></div>
                    <div><div class="info-label">👥 Capacity</div><div class="info-val">${r.capacity}</div></div>
                </div>
                <div class="dishes"><div class="dishes-title">Must Try</div><div class="dishes-list">${dishesHtml}</div></div>
                <div class="reviews">${reviewsHtml}</div>
                <div class="booking"><div class="booking-label">Booking</div><div class="booking-val">${r.booking}</div></div>
                <div class="gallery">${galleryHtml}</div>
            </div>
        </div>
    `;
    return card;
}

// Format date
function formatDate(dateStr) {
    const d = new Date(dateStr);
    return `${d.getMonth() + 1}/${d.getDate()}`;
}

// Update stats
function updateStats() {
    const tried = allRestaurants.filter(r => r.status === 'tried').length;
    document.getElementById('sTotal').textContent = filteredRestaurants.length;
    document.getElementById('sTried').textContent = tried;
    document.getElementById('sTogo').textContent = allRestaurants.length - tried;
}

// Initialize on load
window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
